<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uppercase to Lowercase Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    textarea::placeholder { color: #9CA3AF; }
    .btn-press { transition: transform 0.1s ease; }
    .btn-press:active { transform: scale(0.97); }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-100 min-h-screen flex items-center justify-center p-4">
  <main class="bg-white p-6 sm:p-8 rounded-3xl shadow-xl w-full max-w-2xl fade-in border border-slate-100">
    <div class="flex items-center justify-center gap-3 mb-2">
      <div class="bg-blue-100 p-2 rounded-xl">
        <svg class="w-6 h-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Case Converter</h1>
    </div>
    <p class="text-slate-500 mb-6 text-center text-sm">Instantly transform your text from Uppercase to Lowercase.</p>
    
    <div class="space-y-5">
      <!-- Input Section -->
      <div>
        <div class="flex justify-between items-center mb-1.5 px-1">
          <label for="inputText" class="text-sm font-semibold text-slate-700">Input Text</label>
          <span id="charCount" class="text-xs font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">0 chars</span>
        </div>
        <textarea id="inputText" placeholder="TYPE YOUR UPPERCASE TEXT HERE..." class="w-full h-40 p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none resize-none transition bg-slate-50 text-slate-800 font-mono text-base"></textarea>
      </div>
      
      <!-- Controls -->
      <div class="flex gap-3 justify-center">
        <button id="convertBtn" class="btn-press bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-md hover:shadow-blue-200 flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>
          Convert
        </button>
        <button id="swapBtn" class="btn-press bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 px-4 rounded-xl transition duration-200 border border-slate-200" title="Swap Input & Output">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" /></svg>
        </button>
        <button id="clearBtn" class="btn-press bg-slate-100 hover:bg-red-50 hover:text-red-600 hover:border-red-200 text-slate-600 font-semibold py-3 px-5 rounded-xl transition duration-200 border border-slate-200 flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          Clear
        </button>
      </div>
      
      <!-- Output Section -->
      <div>
        <div class="flex justify-between items-center mb-1.5 px-1">
          <label for="outputText" class="text-sm font-semibold text-slate-700">Output Text</label>
          <button id="copyBtn" class="text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1.5 transition bg-blue-50 hover:bg-blue-100 px-3 py-1 rounded-lg">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
            Copy
          </button>
        </div>
        <textarea id="outputText" readonly placeholder="Converted text will appear here..." class="w-full h-40 p-4 border border-slate-200 rounded-2xl bg-white text-slate-600 resize-none font-mono text-base outline-none cursor-default focus:ring-2 focus:ring-slate-200 transition"></textarea>
      </div>
    </div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-4 bg-slate-800 text-white px-5 py-3 rounded-full shadow-xl opacity-0 transition-all duration-300 pointer-events-none text-sm font-medium z-50 flex items-center gap-2.5 backdrop-blur-sm">
    <span id="toastIcon" class="flex-shrink-0 w-5 h-5 text-green-400"></span>
    <span id="toastMessage" class="pr-1">Action successful</span>
  </div>

  <script>
    (function() {
      const els = {
        input: document.getElementById('inputText'),
        output: document.getElementById('outputText'),
        convert: document.getElementById('convertBtn'),
        swap: document.getElementById('swapBtn'),
        clear: document.getElementById('clearBtn'),
        copy: document.getElementById('copyBtn'),
        toast: document.getElementById('toast'),
        toastMsg: document.getElementById('toastMessage'),
        toastIcon: document.getElementById('toastIcon'),
        charCount: document.getElementById('charCount')
      };

      let toastTimeout;

      const icons = {
        success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />',
        error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />'
      };

      function showToast(msg, type = 'success') {
        clearTimeout(toastTimeout);
        els.toastMsg.textContent = msg;
        els.toastIcon.innerHTML = icons[type];
        
        if (type === 'success') {
          els.toastIcon.className = 'flex-shrink-0 w-5 h-5 text-green-400';
          els.toast.className = els.toast.className.replace('bg-red-700', 'bg-slate-800');
        } else {
          els.toastIcon.className = 'flex-shrink-0 w-5 h-5 text-red-400';
          els.toast.className = els.toast.className.replace('bg-slate-800', 'bg-red-700');
        }
        
        els.toast.style.opacity = '1';
        els.toast.style.transform = 'translate(-50%, 0)';
        
        toastTimeout = setTimeout(() => {
          els.toast.style.opacity = '0';
          els.toast.style.transform = 'translate(-50%, 12px)';
        }, 2500);
      }

      function updateCharCount() {
        els.charCount.textContent = `${els.input.value.length} chars`;
      }

      els.input.addEventListener('input', updateCharCount);

      els.convert.addEventListener('click', () => {
        if (!els.input.value.trim()) {
          showToast('Please enter some text first.', 'error');
          return;
        }
        els.output.value = els.input.value.toLowerCase();
        showToast('Text converted successfully!');
      });

      els.clear.addEventListener('click', () => {
        els.input.value = '';
        els.output.value = '';
        updateCharCount();
        els.input.focus();
        showToast('Cleared.');
      });

      els.swap.addEventListener('click', () => {
        if (!els.output.value) {
          showToast('No output to swap.', 'error');
          return;
        }
        const temp = els.output.value;
        els.output.value = els.input.value;
        els.input.value = temp;
        updateCharCount();
        showToast('Input and output swapped.');
      });

      els.copy.addEventListener('click', () => {
        if (!els.output.value) {
          showToast('Nothing to copy.', 'error');
          return;
        }
        navigator.clipboard.writeText(els.output.value).then(() => {
          showToast('Copied to clipboard!');
        }).catch(() => {
          showToast('Failed to copy.', 'error');
        });
      });

      // Initialize
      updateCharCount();
    })();
  </script>
</body>
</html>
