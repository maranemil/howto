<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Line Remover</title>
  <!--
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource@latest/lato/index.css">
  -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1rem;
      color: #a0a0b0;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s;
    }

    .panel:hover {
      border-color: rgba(167, 139, 250, 0.3);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .panel-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #c4b5fd;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .char-count {
      font-size: 0.85rem;
      color: #888;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 16px;
      color: #e0e0e0;
      font-family: 'Lato', monospace;
      font-size: 0.95rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    textarea:focus {
      border-color: rgba(167, 139, 250, 0.5);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
    }

    textarea::placeholder {
      color: #555;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: #fff;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(124, 58, 237, 0.5);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(167, 139, 250, 0.5);
    }

    .btn-icon {
      width: 20px;
      height: 20px;
    }

    .options-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .option-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #b0b0c0;
      cursor: pointer;
      user-select: none;
    }

    .option-toggle input[type="checkbox"] {
      display: none;
    }

    .toggle-track {
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      position: relative;
      transition: background 0.3s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #888;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .option-toggle input:checked+.toggle-track {
      background: rgba(124, 58, 237, 0.4);
    }

    .option-toggle input:checked+.toggle-track::after {
      left: 23px;
      background: #a78bfa;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(52, 211, 153, 0.9);
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Text Line Remover</h1>
      <p>Remove all newlines and convert your text into a single line</p>
    </header>

    <div class="options-bar">
      <label class="option-toggle">
        <input type="checkbox" id="replaceWithSpace" checked>
        <span class="toggle-track"></span>
        Replace newlines with spaces
      </label>
      <label class="option-toggle">
        <input type="checkbox" id="trimWhitespace" checked>
        <span class="toggle-track"></span>
        Trim extra whitespace
      </label>
    </div>

    <div class="editor-grid">
      <div class="panel">
        <div class="panel-header">
          <h2>Input</h2>
          <span class="char-count" id="inputCount">0 characters</span>
        </div>
        <textarea id="inputText" placeholder="Paste or type your text here..."></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h2>Output</h2>
          <span class="char-count" id="outputCount">0 characters</span>
        </div>
        <textarea id="outputText" placeholder="Converted text will appear here..." readonly></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="convertBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
        Convert
      </button>
      <button class="btn btn-secondary" id="copyBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
        Copy Output
      </button>
      <button class="btn btn-secondary" id="clearBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Clear
      </button>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const inputCount = document.getElementById('inputCount');
    const outputCount = document.getElementById('outputCount');
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const replaceWithSpace = document.getElementById('replaceWithSpace');
    const trimWhitespace = document.getElementById('trimWhitespace');
    const toast = document.getElementById('toast');

    function updateCounts() {
      inputCount.textContent = inputText.value.length + ' characters';
      outputCount.textContent = outputText.value.length + ' characters';
    }

    inputText.addEventListener('input', updateCounts);

    function convertText() {
      const raw = inputText.value;
      if (!raw) {
        outputText.value = '';
        updateCounts();
        return;
      }

      let result;
      if (replaceWithSpace.checked) {
        result = raw.replace(/\r?\n/g, ' ,');
      } else {
        result = raw.replace(/\r?\n/g, ',');
      }

      if (trimWhitespace.checked) {
        result = result.replace(/\s+/g, ' ').trim();
      }

      outputText.value = result;
      updateCounts();
    }

    convertBtn.addEventListener('click', convertText);

    copyBtn.addEventListener('click', async () => {
      if (!outputText.value) return;
      try {
        await navigator.clipboard.writeText(outputText.value);
        showToast('Copied to clipboard!');
      } catch {
        outputText.select();
        document.execCommand('copy');
        showToast('Copied to clipboard!');
      }
    });

    clearBtn.addEventListener('click', () => {
      inputText.value = '';
      outputText.value = '';
      updateCounts();
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    replaceWithSpace.addEventListener('change', convertText);
    trimWhitespace.addEventListener('change', convertText);
  </script>
</body>

</html>
